version: '3.8'

services:
  mongo:
    image: mongo
    container_name: mern-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network

  backend:
    build: ./backend
    container_name: mern-backend
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      DB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongo:27017/testdb?authSource=admin
    depends_on:
      - mongo
    networks:
      - mern-network
    image: kseniavscode/my-mern:backend-v1
  frontend:
    build: ./frontend
    container_name: mern-frontend
    ports:
      - "3000:3000"
    stdin_open: true 
    tty: true
    networks:
      - mern-network
    image: kseniavscode/my-mern:frontend-v1

volumes:
  mongo-data:

networks:
  mern-network:
    driver: bridge
