{% extends 'pages/layout.html' %}
{% load static %}

{% block title %}Registration{% endblock %}

{% block content %}
    <h1>Registration</h1>
    <form method="post">
        {% csrf_token %}
        
        {% for field in form %}
            <p>
                {{ field.label_tag }}<br>
                {{ field }}
                {% if field.errors %}
                    <div style="color: red;">{{ field.errors }}</div>
                {% endif %}
            </p>
        {% endfor %}

        <button type="submit">Зарегистрироваться</button>
    </form>

{% endblock %}
